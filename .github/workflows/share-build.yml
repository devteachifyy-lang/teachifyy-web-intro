name: Share Build to Another Account

on:
  push:
    branches:
      - main

jobs:
  build-and-share:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Configure git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Push to teachifyy-web-intro
        run: |
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/devndchill-commits/teachifyy-web-intro.git repo1
          
          cd repo1
          rm -rf .next out public dist || true
          
          cp -r ../.next .next 2>/dev/null || true
          cp -r ../out out 2>/dev/null || true
          cp ../package.json package.json
          cp ../package-lock.json package-lock.json 2>/dev/null || true
          
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update build from source repository

Source: ${{ github.repository }}@${{ github.sha }}
Author: ${{ github.actor }}
Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
            echo "✓ Pushed to teachifyy-web-intro"
          else
            echo "No changes to commit in teachifyy-web-intro"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}

      - name: Push to teachifyy-web-build
        run: |
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/devndchill-commits/teachifyy-web-build.git repo2
          
          cd repo2
          rm -rf .next out public dist || true
          
          cp -r ../.next .next 2>/dev/null || true
          cp -r ../out out 2>/dev/null || true
          cp ../package.json package.json
          cp ../package-lock.json package-lock.json 2>/dev/null || true
          
          git add -A
          
          if ! git diff --cached --quiet; then
            git commit -m "chore: update build from source repository

Source: ${{ github.repository }}@${{ github.sha }}
Author: ${{ github.actor }}
Timestamp: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push origin main
            echo "✓ Pushed to teachifyy-web-build"
          else
            echo "No changes to commit in teachifyy-web-build"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
